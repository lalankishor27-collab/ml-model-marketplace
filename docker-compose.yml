services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ml-marketplace-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/trained_models:/app/trained_models
      - ml_db:/app/data
    environment:
      - DATABASE_URL=sqlite:///./data/ml_marketplace.db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ml-marketplace-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  ml_db:
